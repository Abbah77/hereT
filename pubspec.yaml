name: here
description: A complete offline-first Flutter application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Local Database (Drift + SQLite)
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.1
  path: ^1.9.0
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Connectivity
  connectivity_plus: ^5.0.2
  
  # Background Tasks
  workmanager: ^0.5.1
  
  # State Management
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  
  # Networking
  dio: ^5.4.0
  
  # UUID for unique IDs
  uuid: ^4.3.3
  
  # Utilities
  intl: ^0.18.1
  equatable: ^2.0.5
  
  # UI
  google_fonts: ^6.1.1
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  image_picker: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.14.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true